{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-person-plus-fill"></i> Create an Account</h4>
            </div>
            <div class="card-body">
                <p class="text-muted">Register to access the TB-PTLD Risk Prediction System. All new accounts require Administrator approval.</p>
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="role" class="form-label">Requested Role</label>
                        <select class="form-select" id="role" name="role" required>
                            <option value="ANALYST">Data Analyst (Read-Only Dashboards)</option>
                            <option value="CLINICIAN">Clinician (Full Patient Access)</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="confirm_password" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2 mt-3">
                        <button type="submit" class="btn btn-primary btn-lg">Register Account</button>
                    </div>
                </form>
                
                <div class="text-center mt-3">
                    Already have an account? <a href="{% url 'login' %}">Log in here</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
