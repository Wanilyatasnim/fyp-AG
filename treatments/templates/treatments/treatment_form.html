{% extends 'base.html' %}

{% block title %}Update Treatment for {{ patient.name }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Update Treatment - {{ patient.name }}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save Treatment</button>
        <a href="{% url 'patient_detail' patient.patient_id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
